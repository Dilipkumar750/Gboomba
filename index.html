<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />
    
    <!-- Viewport for Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./logo.png" />
    
    <!-- Title -->
    <title>GBOOMBA - Complete Home Solutions | Packers & Movers</title>
    
    <!-- Meta Description -->
    <meta name="description" content="GBOOMBA - Complete home solutions. Packers & movers, cleaning, painting, electrical, plumbing, AC services, and carpentry in Coimbatore, Erode. Call 81 1100 2100 for free quote." />
    
    <!-- Meta Keywords -->
    <meta name="keywords" content="GBOOMBA, packers and movers, home services, cleaning services, painting services, electrical services, plumbing services, AC technician, carpentry services, house relocation, office relocation, shop relocation, home services Coimbatore, packers and movers Erode" />
    
    <!-- Meta Robots -->
    <meta name="robots" content="index, follow" />
    
    <!-- Author -->
    <meta name="author" content="GBOOMBA Home Solutions" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="GBOOMBA - Complete Home Solutions" />
    <meta property="og:description" content="Professional home services - packers & movers, cleaning, painting, electrical, plumbing, AC services, and carpentry." />
    <meta property="og:image" content="./logo.png" />
    <meta property="og:url" content="https://gboomba.com" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GBOOMBA - Complete Home Solutions" />
    <meta name="twitter:description" content="Professional home services - packers & movers, cleaning, painting, electrical, plumbing, AC services, and carpentry." />
    <meta name="twitter:image" content="./logo.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://gboomba.com" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#1a2a4a" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Basic Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8f9fa;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #008080;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #006666;
      }
      
      /* Selection Color */
      ::selection {
        background-color: #008080;
        color: #ffffff;
      }
    </style>
  </head>

    <script type="module" src="/src/main.jsx"></script>
